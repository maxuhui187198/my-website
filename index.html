<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>饼图看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .login-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-box {
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .login-box h2 { text-align: center; margin-bottom: 30px; color: #333; }
        .login-form { display: flex; flex-direction: column; gap: 10px; }
        .login-form label { font-size: 14px; color: #666; margin-bottom: 4px; }
        #credentialFields { display: flex; flex-direction: column; gap: 15px; }
        .form-group-item { display: flex; flex-direction: column; }
        .login-form select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background: #fff;
        }
        .login-form input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .login-form input:focus, .login-form select:focus { outline: none; border-color: #409eff; }
        .login-btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            background: #409eff;
            color: #fff;
            transition: background 0.3s;
        }
        .login-btn:hover { background: #66b1ff; }
        .charts-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .chart-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 20px; flex: 1; min-width: 0; }
        .chart-title-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .chart-title-input:focus { outline: none; border-color: #409eff; }
        .chart-title-text {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .chart-dom { width: 100%; height: 500px; }
        .control-panel {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 20px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .control-section { flex: 1; min-width: 300px; }
        .control-section h3 { margin-bottom: 15px; color: #333; font-size: 16px; }
        .form-group { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
        .form-item { display: flex; flex-direction: column; min-width: 140px; flex: 1; }
        .form-item label { font-size: 13px; color: #666; margin-bottom: 4px; }
        .form-item input { padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
        .form-item input:focus { outline: none; border-color: #409eff; }
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 8px 18px; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: #409eff; color: #fff; }
        .btn-primary:hover { background: #66b1ff; }
        .btn-default { background: #f0f0f0; color: #333; }
        .btn-default:hover { background: #e0e0e0; }
        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: #f56c6c;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .logout-btn:hover { background: #f78989; }
        .hidden { display: none !important; }
        .login-error {
            color: #f56c6c;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2>请选择角色登录</h2>
            <div id="loginError" class="login-error"></div>
            <div class="login-form">
                <label>角色</label>
                <select id="roleSelect" onchange="toggleCredentialFields()">
                    <option value="user">普通用户</option>
                    <option value="admin">管理员</option>
                </select>
                <div id="credentialFields" class="hidden">
                    <div class="form-group-item">
                        <label>用户名</label>
                        <input type="text" id="username" placeholder="请输入用户名">
                    </div>
                    <div class="form-group-item">
                        <label>密码</label>
                        <input type="password" id="password" placeholder="请输入密码">
                    </div>
                </div>
                <button class="login-btn" onclick="login()">登录</button>
            </div>
        </div>
    </div>

    <button id="logoutBtn" class="logout-btn hidden" onclick="logout()">退出登录</button>

    <div class="charts-row">
        <div class="chart-card">
            <input type="text" class="chart-title-input" id="title1" value="人工粉末筛选分类" oninput="updateTitle1()">
            <div id="chart1" class="chart-dom"></div>
        </div>
        <div class="chart-card">
            <input type="text" class="chart-title-input" id="title2" value="不能舀分类" oninput="updateTitle2()">
            <div id="chart2" class="chart-dom"></div>
        </div>
    </div>

    <div id="controlPanel" class="control-panel">
        <div class="control-section">
            <h3>人工粉末筛选分类 - 数据更新</h3>
            <div class="form-group">
                <div class="form-item"><label>已判断</label><input type="number" id="judged" value="4046"></div>
                <div class="form-item"><label>待验证</label><input type="number" id="pending" value="1366"></div>
            </div>
            <div class="form-group">
                <div class="form-item"><label>能舀</label><input type="number" id="canScoop" value="1215"></div>
                <div class="form-item"><label>不能舀</label><input type="number" id="cannotScoop" value="2821"></div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="updateChart1()">更新图表1</button>
                <button class="btn btn-default" onclick="resetData1()">重置数据</button>
            </div>
        </div>
        <div class="control-section">
            <h3>不能舀分类 - 数据更新</h3>
            <div class="form-group">
                <div class="form-item"><label>固体（颗粒大、粘性强、絮状、强静电等）</label><input type="number" id="solid" value="2152"></div>
                <div class="form-item"><label>液体</label><input type="number" id="liquid" value="669"></div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="updateChart2()">更新图表2</button>
                <button class="btn btn-default" onclick="resetData2()">重置数据</button>
            </div>
        </div>
    </div>

    <script>
        var chart1Dom = document.getElementById('chart1');
        var chart1 = echarts.init(chart1Dom);
        var chart2Dom = document.getElementById('chart2');
        var chart2 = echarts.init(chart2Dom);

        var currentUserRole = null;

        function toggleCredentialFields() {
            var role = document.getElementById('roleSelect').value;
            var credentialFields = document.getElementById('credentialFields');
            var loginError = document.getElementById('loginError');
            if (role === 'admin') {
                credentialFields.classList.remove('hidden');
            } else {
                credentialFields.classList.add('hidden');
                loginError.textContent = '';
            }
        }

        function login() {
            var role = document.getElementById('roleSelect').value;
            var loginError = document.getElementById('loginError');
            loginError.textContent = '';

            if (role === 'admin') {
                var username = document.getElementById('username').value.trim();
                var password = document.getElementById('password').value.trim();
                if (username !== 'admin' || password !== 'admin') {
                    loginError.textContent = '用户名或密码错误，请重新输入';
                    return;
                }
            }

            localStorage.setItem('userRole', role);
            currentUserRole = role;
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            applyRolePermissions();
            initData();
        }

        function logout() {
            localStorage.removeItem('userRole');
            currentUserRole = null;
            document.getElementById('loginOverlay').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('controlPanel').classList.remove('hidden');
            restoreTitleInputs();
        }

        function applyRolePermissions() {
            var controlPanel = document.getElementById('controlPanel');
            var title1Input = document.getElementById('title1');
            var title2Input = document.getElementById('title2');

            if (currentUserRole === 'admin') {
                controlPanel.classList.remove('hidden');
                restoreTitleInputs();
            } else {
                controlPanel.classList.add('hidden');
                replaceTitleInputsWithText();
            }
        }

        function replaceTitleInputsWithText() {
            var title1Input = document.getElementById('title1');
            var title2Input = document.getElementById('title2');

            if (title1Input && title1Input.tagName === 'INPUT') {
                var title1Text = title1Input.value;
                title1Input.parentNode.replaceChild(createTitleText('title1', title1Text), title1Input);
            }

            if (title2Input && title2Input.tagName === 'INPUT') {
                var title2Text = title2Input.value;
                title2Input.parentNode.replaceChild(createTitleText('title2', title2Text), title2Input);
            }
        }

        function createTitleText(id, text) {
            var span = document.createElement('span');
            span.id = id;
            span.className = 'chart-title-text';
            span.textContent = text;
            return span;
        }

        function restoreTitleInputs() {
            var title1El = document.getElementById('title1');
            var title2El = document.getElementById('title2');

            if (title1El && title1El.tagName === 'SPAN') {
                var input1 = document.createElement('input');
                input1.type = 'text';
                input1.className = 'chart-title-input';
                input1.id = 'title1';
                input1.value = title1El.textContent;
                input1.oninput = updateTitle1;
                title1El.parentNode.replaceChild(input1, title1El);
            }

            if (title2El && title2El.tagName === 'SPAN') {
                var input2 = document.createElement('input');
                input2.type = 'text';
                input2.className = 'chart-title-input';
                input2.id = 'title2';
                input2.value = title2El.textContent;
                input2.oninput = updateTitle2;
                title2El.parentNode.replaceChild(input2, title2El);
            }
        }

        function checkLoginStatus() {
            var savedRole = localStorage.getItem('userRole');
            if (savedRole) {
                currentUserRole = savedRole;
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                applyRolePermissions();
                return true;
            }
            return false;
        }

        var defaultData1 = {
            judged: 4046,
            pending: 1366,
            canScoop: 1215,
            cannotScoop: 2821
        };

        var defaultData2 = {
            solid: 2152,
            liquid: 669
        };

        var title1Text = '人工粉末筛选分类';
        var title2Text = '不能舀分类';

        function getChart1Option(data) {
            var judgedSubTotal = data.canScoop + data.cannotScoop;
            var scale = judgedSubTotal > 0 ? data.judged / judgedSubTotal : 1;
            var scaledCanScoop = Math.round(data.canScoop * scale);
            var scaledCannotScoop = data.judged - scaledCanScoop;

            var innerData = [
                { value: data.judged, name: '已判断', itemStyle: { color: '#5470c6' } },
                { value: data.pending, name: '待验证', itemStyle: { color: '#91cc75' } }
            ];

            var outerData = [
                { value: scaledCanScoop, name: '能舀', realValue: data.canScoop, itemStyle: { color: '#73a0fa' } },
                { value: scaledCannotScoop, name: '不能舀', realValue: data.cannotScoop, itemStyle: { color: '#3b5bdb' } },
                { value: data.pending, name: '待验证', realValue: data.pending, itemStyle: { color: '#91cc75' } }
            ];

            return {
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        var val = params.data.realValue !== undefined ? params.data.realValue : params.value;
                        return params.name + '<br/>数量: ' + val + '<br/>占比: ' + params.percent + '%';
                    }
                },
                legend: {
                    orient: 'vertical',
                    right: '5%',
                    top: 'center',
                    itemGap: 12
                },
                series: [
                    {
                        name: '主分类',
                        type: 'pie',
                        radius: ['0%', '50%'],
                        center: ['50%', '50%'],
                        label: {
                            position: 'inner',
                            fontSize: 13,
                            fontWeight: 'bold',
                            color: '#fff',
                            formatter: function(params) {
                                return params.name + '\n' + params.value + '\n(' + params.percent + '%)';
                            }
                        },
                        labelLine: { show: false },
                        data: innerData,
                        itemStyle: { borderColor: '#fff', borderWidth: 2 }
                    },
                    {
                        name: '细分',
                        type: 'pie',
                        radius: ['50%', '75%'],
                        center: ['50%', '50%'],
                        avoidLabelOverlap: false,
                        labelLayout: { hideOverlap: false },
                        label: {
                            show: true,
                            position: 'outside',
                            formatter: function(params) {
                                var val = params.data.realValue !== undefined ? params.data.realValue : params.value;
                                return params.name + '\n' + val + ' (' + params.percent + '%)';
                            },
                            fontSize: 12,
                            color: '#333'
                        },
                        labelLine: {
                            show: true,
                            length: 15,
                            length2: 20,
                            smooth: true
                        },
                        data: outerData,
                        itemStyle: { borderColor: '#fff', borderWidth: 2 }
                    }
                ]
            };
        }

        function getChart2Option(data) {
            var pieData = [
                { value: data.solid, name: '固体（颗粒大、粘性强、絮状、强静电等）', itemStyle: { color: '#52d1f5' } },
                { value: data.liquid, name: '液体', itemStyle: { color: '#5470c6' } }
            ];

            return {
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        return params.name + '<br/>数量: ' + params.value + '<br/>占比: ' + params.percent + '%';
                    }
                },
                legend: {
                    orient: 'vertical',
                    right: '5%',
                    top: 'center',
                    itemGap: 12
                },
                series: [
                    {
                        name: '不能舀分类',
                        type: 'pie',
                        radius: '58%',
                        center: ['40%', '50%'],
                        avoidLabelOverlap: false,
                        labelLayout: { hideOverlap: false },
                        label: {
                            show: true,
                            position: 'outside',
                            formatter: function(params) {
                                return params.name + '\n' + params.value + ' (' + params.percent + '%)';
                            },
                            fontSize: 12,
                            color: '#333'
                        },
                        labelLine: {
                            show: true,
                            length: 15,
                            length2: 20,
                            smooth: true
                        },
                        data: pieData,
                        itemStyle: { borderColor: '#fff', borderWidth: 2 }
                    }
                ]
            };
        }

        function updateTitle1() {
            title1Text = document.getElementById('title1').value;
            localStorage.setItem('title1', title1Text);
            updateChart1();
        }

        function updateTitle2() {
            title2Text = document.getElementById('title2').value;
            localStorage.setItem('title2', title2Text);
            updateChart2();
        }

        function updateChart1() {
            var judged = parseInt(document.getElementById('judged').value) || 0;
            var pending = parseInt(document.getElementById('pending').value) || 0;
            var canScoop = parseInt(document.getElementById('canScoop').value) || 0;
            var cannotScoop = parseInt(document.getElementById('cannotScoop').value) || 0;

            var data = {
                judged: judged,
                pending: pending,
                canScoop: canScoop,
                cannotScoop: cannotScoop
            };

            localStorage.setItem('chartData1', JSON.stringify(data));
            chart1.setOption(getChart1Option(data), true);
        }

        function resetData1() {
            localStorage.removeItem('chartData1');
            document.getElementById('judged').value = defaultData1.judged;
            document.getElementById('pending').value = defaultData1.pending;
            document.getElementById('canScoop').value = defaultData1.canScoop;
            document.getElementById('cannotScoop').value = defaultData1.cannotScoop;
            updateChart1();
        }

        function updateChart2() {
            var solid = parseInt(document.getElementById('solid').value) || 0;
            var liquid = parseInt(document.getElementById('liquid').value) || 0;

            var data = {
                solid: solid,
                liquid: liquid
            };

            localStorage.setItem('chartData2', JSON.stringify(data));
            chart2.setOption(getChart2Option(data), true);
        }

        function resetData2() {
            localStorage.removeItem('chartData2');
            document.getElementById('solid').value = defaultData2.solid;
            document.getElementById('liquid').value = defaultData2.liquid;
            updateChart2();
        }

        function initData() {
            var savedData1 = localStorage.getItem('chartData1');
            var savedData2 = localStorage.getItem('chartData2');
            var savedTitle1 = localStorage.getItem('title1');
            var savedTitle2 = localStorage.getItem('title2');

            if (savedData1) {
                var data1 = JSON.parse(savedData1);
                document.getElementById('judged').value = data1.judged;
                document.getElementById('pending').value = data1.pending;
                document.getElementById('canScoop').value = data1.canScoop;
                document.getElementById('cannotScoop').value = data1.cannotScoop;
                chart1.setOption(getChart1Option(data1));
            } else {
                chart1.setOption(getChart1Option(defaultData1));
            }

            if (savedData2) {
                var data2 = JSON.parse(savedData2);
                document.getElementById('solid').value = data2.solid;
                document.getElementById('liquid').value = data2.liquid;
                chart2.setOption(getChart2Option(data2));
            } else {
                chart2.setOption(getChart2Option(defaultData2));
            }

            if (savedTitle1) {
                document.getElementById('title1').value = savedTitle1;
                title1Text = savedTitle1;
            }

            if (savedTitle2) {
                document.getElementById('title2').value = savedTitle2;
                title2Text = savedTitle2;
            }
        }

        if (checkLoginStatus()) {
            initData();
        }

        window.addEventListener('resize', function() {
            chart1.resize();
            chart2.resize();
        });
    </script>
</body>
</html>
